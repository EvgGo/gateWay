services:
  postgres:
    container_name: ${APP_NAME}-${APP_ENV}-postgres
    restart: on-failure
    image: postgres:15-alpine
    command: postgres -c 'max_connections=200'
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - project_postgres:/var/lib/postgresql/data
    networks:
      - project

volumes:
  project_postgres:

networks:
  project:
    driver: bridge